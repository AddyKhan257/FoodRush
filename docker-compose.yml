networks:
    foodrush-nw:
        driver: bridge

volumes:
    postgres-vol:

services:


    db:
      image: postgres:15
      container_name: foodrush-db
      restart: unless-stopped 
      environment:
        POSTGRES_DB: ${DB_NAME}
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d foodrush_db"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

      ports:
        - "5432:5432"

      networks:
        - foodrush-nw
      volumes:
        - postgres-vol:/var/lib/postgresql/data 


    nginx:
      image: nginx:alpine
      container_name: nginx-container
      restart: unless-stopped
      ports:
        - "80:80"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      networks:
        - foodrush-nw
      depends_on:
        - backend
        - frontend


    frontend:
      build:
        context: ./frontend
        args:
          REACT_APP_API_URL: http://localhost/api
           
        
      container_name: frontend-container
      restart: unless-stopped 
      ports:
        - "3000:80"
      networks:
        - foodrush-nw


    backend:
      build: ./backend
      container_name: backend-container
      restart: unless-stopped 
      ports:
        - "5000:5000"
      networks:
        - foodrush-nw
      
      environment:
        DB_HOST: db
        DB_PORT: 5432
        DB_NAME: ${DB_NAME}
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        NODE_ENV: development
        JWT_SECRET: ${JWT_SECRET}
        JWT_EXPIRE: ${JWT_EXPIRE}
        FRONTEND_URL: ${FRONTEND_URL}
      depends_on:
        db:
          condition: service_healthy

